services:
  - type: web
    name: songqueue-backend
    runtime: python
    buildCommand: pip install -r server/requirements.txt
    startCommand: gunicorn -w 1 --chdir server --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: 5000
